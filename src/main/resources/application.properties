# ===============================
# CONFIGURACI\u00d3N DEL SERVIDOR
# ===============================
# El puerto donde correr\u00e1 tu API (Webpack en React apuntar\u00e1 aqu\u00ed)
server.port=8080
# La ruta base de tu API (ej. http://localhost:8080/prism)
server.servlet.context-path=/

# ===============================
# CONEXI\u00d3N A MYSQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/prism_db?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
# El password de root que pide el documento estrictamente
spring.datasource.password=takemebacktola
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIGURACI\u00d3N DE HIBERNATE / JPA
# ===============================
# Esto imprimir\u00e1 en la consola las consultas SQL que Spring hace por ti (\u00fatil para debug)
spring.jpa.show-sql=true
# Mantiene sincronizadas tus clases de Java con las tablas de MySQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect